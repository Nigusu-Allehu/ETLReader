name: Publish to NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Resolve version
        id: version
        run: |
          echo "VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/ETLReader.csproj

      - name: Build
        run: dotnet build src/ETLReader.csproj --no-restore --configuration Release

      - name: Pack
        run: dotnet pack src/ETLReader.csproj --no-build --configuration Release --output ./nupkgs

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Update server.json version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/ETLReader@[0-9]*\.[0-9]*\.[0-9]*/ETLReader@${VERSION}/" server.json

      - name: Commit updated server.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.json
          git diff --cached --quiet || git commit -m "chore: update server.json to v${VERSION} [skip ci]"
          git push origin HEAD:main
